server:
  port: 9092

spring:
  application:
    name: store-user
  config:
    import: optional:nacos:store-user.yml
  cloud:
    nacos:
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      server-addr: ${NACOS_SERVER:127.0.0.1:8848}
      config:
        import-check:
          enabled: false
        namespace: ${NACOS_NAMESPACE:public}
        group: DEFAULT_GROUP
        file-extension: yml
        shared-configs:
          - data-id: common.yml
            group: DEFAULT_GROUP
            refresh: true
      discovery:
        namespace: ${NACOS_NAMESPACE:public}
        group: DEFAULT_GROUP
    sentinel:
      eager: true
      transport:
        port: 8719
      datasource:
        ds:
          nacos:
            server-addr: ${NACOS_SERVER:127.0.0.1:8848}
            dataId: ${spring.application.name}-sentinel
            groupId: ${NACOS_GROUP:LZLJ_GROUP}
            data-type: json
            rule-type: flow
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:lzlj_user}?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:password123}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall,slf4j
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin123
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
  data:
    redis:
      # 模式切换：standalone / sentinel / cluster
      mode: ${REDIS_MODE:standalone}
      # ========== 通用配置 ==========
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
      # ========== Standalone（单机）==========
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      # ========== Sentinel（哨兵）==========
      sentinel:
        master: ${REDIS_SENTINEL_MASTER:mymaster}
        nodes: ${REDIS_SENTINEL_NODES:127.0.0.1:26379,127.0.0.1:26389,127.0.0.1:26399}
        password: ${REDIS_SENTINEL_PASSWORD:}
      # ========== Cluster（集群）==========
      cluster:
        nodes: ${REDIS_CLUSTER_NODES:127.0.0.1:6379,127.0.0.1:6380,127.0.0.1:6381}
        max-redirects: 3
  rocketmq:
    name-server: ${ROCKETMQ_NAMESRV:localhost:9876}
    producer:
      group: ${spring.application.name}-producer
      send-message-timeout: 3000

# Seata 配置
seata:
  enabled: true
  application-id: ${spring.application.name}
  tx-service-group: ${NACOS_GROUP:LZLJ_GROUP}-tx-group
  service:
    vgroup-mapping:
      ${NACOS_GROUP:LZLJ_GROUP}-tx-group: default
    grouplist:
      default: 127.0.0.1:8091
  config:
    type: nacos
    nacos:
      server-addr: ${NACOS_SERVER:127.0.0.1:8848}
      namespace: ${NACOS_NAMESPACE:public}
      group: ${NACOS_GROUP:LZLJ_GROUP}
      data-id: seata.yml
  registry:
    type: nacos
    nacos:
      server-addr: ${NACOS_SERVER:127.0.0.1:8848}
      namespace: ${NACOS_NAMESPACE:public}
      group: ${NACOS_GROUP:LZLJ_GROUP}

# Dubbo 配置
dubbo:
  application:
    name: ${spring.application.name}
  protocol:
    name: dubbo
    port: -1
  registry:
    address: nacos://${NACOS_SERVER:127.0.0.1:8848}
    parameters:
      namespace: ${NACOS_NAMESPACE:public}
      group: ${NACOS_GROUP:LZLJ_GROUP}
  provider:
    timeout: 3000
    retries: 1
  consumer:
    timeout: 5000
    check: false

# JWT 配置
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-token-signing-lzlj}
  expiration: 86400000  # 24小时

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.lzlj.store.user.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# OpenAPI
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

logging:
  level:
    com.lzlj.store.user: DEBUG
    com.baomidou.mybatisplus: DEBUG
