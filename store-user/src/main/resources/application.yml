server:
  port: 9092

spring:
  application:
    name: store-user
  config:
    import: optional:nacos:store-user.yml
  cloud:
    openfeign:
      loadbalancer:
        enabled: false
    loadbalancer:
      enabled: false
    nacos:
      discovery:
        enabled: true
        register-enabled: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/store_cloud?useSSL=false&useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&serverTimezone=Asia/Shanghai
    username: root
    password: password123
  data:
    redis:
      # 单体模式（默认）
      host: 127.0.0.1
      port: 6379
      database: 0
      password:
      # Sentinel 模式（注释掉上面，使用下面配置）
      # sentinel:
      #   master: mymaster
      #   nodes: 127.0.0.1:26379,127.0.0.1:26380,127.0.0.1:26381
      #   password: your-sentinel-password
      # Cluster 模式（注释掉上面，使用下面配置）
      # cluster:
      #   nodes: 127.0.0.1:6379,127.0.0.1:6380,127.0.0.1:6381
      timeout: 3000
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.lzlj.store.user.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

seata:
  tx-service-group: default_tx_group
  service:
    vgroup-mapping:
      default_tx_group: default
