# ============================================
# account-gateway dev 环境配置
# ============================================

spring:
  application:
    name: saas-gateway
  config:
    import: optional:nacos:common-jwt.yml,optional:nacos:saas-gateway.yml
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
  cloud:
    nacos:
      username: nacos
      password: nacos
      server-addr: 127.0.0.1:8848
      config:
        namespace: 6fcc6887-5cdd-47d0-aece-6387e527b368
        group: DEFAULT_GROUP
        file-extension: yml
        import-check:
          enabled: false
      discovery:
        namespace: 6fcc6887-5cdd-47d0-aece-6387e527b368
        group: DEFAULT_GROUP
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: auth-api
          uri: lb://saas-auth
          predicates:
            - Path=/api/saas-auth/**
          filters:
            - StripPrefix=2
        - id: goods-api
          uri: lb://saas-goods
          predicates:
            - Path=/api/saas-goods/**
          filters:
            - StripPrefix=2

swagger:
  services: saas-auth,saas-goods

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
