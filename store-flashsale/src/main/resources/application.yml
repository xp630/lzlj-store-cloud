# ============================================
# store-flashsale 启动配置 - 最小化版本
# 所有业务配置统一在 Nacos 中管理
# ============================================

server:
  port: 9097

spring:
  application:
    name: store-flashsale
  profiles:
    active: dev
  config:
    import: optional:nacos:store-flashsale.yml
  cloud:
    nacos:
      config:
        import-check:
          enabled: false
        namespace: ${spring.profiles.active}
        group: DEFAULT_GROUP
        file-extension: yml
        shared-configs:
          - data-id: common.yml
            group: DEFAULT_GROUP
            refresh: true
      discovery:
        namespace: ${spring.profiles.active}
        group: DEFAULT_GROUP
