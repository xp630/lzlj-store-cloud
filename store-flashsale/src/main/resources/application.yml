# ============================================
# store-flashsale 启动配置 - 最小化版本
# 所有业务配置统一在 Nacos 中管理
# ============================================

server:
  port: 9097

spring:
  application:
    name: store-flashsale
  config:
    import: optional:nacos:store-flashsale.yml
  cloud:
    nacos:
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      server-addr: ${NACOS_SERVER:127.0.0.1:8848}
      config:
        import-check:
          enabled: false
        namespace: ${spring.profiles.active:dev}
        group: DEFAULT_GROUP
        file-extension: yml
        shared-configs:
          - data-id: common.yml
            group: DEFAULT_GROUP
            refresh: true
      discovery:
        namespace: ${spring.profiles.active:dev}
        group: DEFAULT_GROUP
