# ============================================
# store-gateway 启动配置 - 最小化版本
# 所有业务配置统一在 Nacos 中管理
# ============================================

server:
  port: 18080

spring:
  application:
    name: store-gateway
  profiles:
    active: dev
  config:
    import: optional:nacos:store-gateway.yml?namespace=6fcc6887-5cdd-47d0-aece-6387e527b368
  autoconfigure:
    exclude:
      - org.springframework.cloud.client.discovery.simple.reactive.SimpleReactiveDiscoveryClientAutoConfiguration
  cloud:
    nacos:
      config:
        import-check:
          enabled: false
        namespace: 6fcc6887-5cdd-47d0-aece-6387e527b368
        group: DEFAULT_GROUP
        file-extension: yml
        shared-configs:
          - data-id: common.yml
            group: DEFAULT_GROUP
            refresh: true
      discovery:
        namespace: 6fcc6887-5cdd-47d0-aece-6387e527b368
        group: DEFAULT_GROUP
        server-addr: 127.0.0.1:8848
        username: nacos
        password: nacos
        enabled: true
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      metrics:
        enabled: true
