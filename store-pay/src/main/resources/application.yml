# ============================================
# store-pay 启动配置 - 最小化版本
# 所有业务配置统一在 Nacos 中管理
# ============================================

server:
  port: 9098

spring:
  application:
    name: store-pay
  profiles:
    active: dev
  config:
    import: optional:nacos:store-pay.yml
  autoconfigure:
    exclude:
      - io.seata.spring.boot.autoconfigure.SeataAutoConfiguration
      - io.seata.spring.boot.autoconfigure.SeataCoreAutoConfiguration
      - io.seata.spring.boot.autoconfigure.SeataDataSourceAutoConfiguration
  cloud:
    nacos:
      config:
        import-check:
          enabled: false
        namespace: 6fcc6887-5cdd-47d0-aece-6387e527b368
        group: DEFAULT_GROUP
        file-extension: yml
        shared-configs:
          - data-id: common.yml
            group: DEFAULT_GROUP
            refresh: true
      discovery:
        namespace: 6fcc6887-5cdd-47d0-aece-6387e527b368
        group: DEFAULT_GROUP
