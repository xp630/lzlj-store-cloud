# ============================================
# account-gateway-lzlj 公共配置
# ============================================

server:
  port: 18081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

# 日志
logging:
  level:
    com.lzlj.account.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG

# 网关路由配置
spring:
  cloud:
    gateway:
      routes:
        # LZLJ 用户服务
        - id: lzlj-user
          uri: lb://account-lzlj-user
          predicates:
            - Path=/api/lzlj/user/**
          filters:
            - StripPrefix=2
        # LZLJ 商品服务
        - id: lzlj-goods
          uri: lb://account-biz-saas-goods
          predicates:
            - Path=/api/lzlj/goods/**
          filters:
            - StripPrefix=2
        # SaaS 认证服务
        - id: saas-auth
          uri: lb://saas-auth
          predicates:
            - Path=/api/saas/auth/**
          filters:
            - StripPrefix=2
        # SaaS 商品服务
        - id: saas-goods
          uri: lb://saas-goods
          predicates:
            - Path=/api/saas/goods/**
          filters:
            - StripPrefix=2
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: false
            maxAge: 3600
