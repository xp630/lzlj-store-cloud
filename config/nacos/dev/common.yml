# ============================================
# 公共配置 - dev 环境
# 所有服务共享的配置
# ============================================

spring:
  cloud:
    openfeign:
      loadbalancer:
        enabled: false
    loadbalancer:
      enabled: false
    sentinel:
      eager: true
      transport:
        port: 8719

  data:
    redis:
      mode: standalone
      host: localhost
      port: 6379
      password:
      database: 0

  rocketmq:
    name-server: localhost:9876
    producer:
      group: ${spring.application.name}-producer
      send-message-timeout: 3000

  autoconfigure:
    exclude:
      - io.seata.spring.boot.autoconfigure.SeataAutoConfiguration
      - io.seata.spring.boot.autoconfigure.SeataCoreAutoConfiguration

seata:
  enabled: false

dubbo:
  application:
    name: ${spring.application.name}
  protocol:
    name: dubbo
    port: -1
  registry:
    address: nacos://127.0.0.1:8848
    parameters:
      namespace: 6fcc6887-5cdd-47d0-aece-6387e527b368
      group: DEFAULT_GROUP
  provider:
    timeout: 3000
    retries: 1
  consumer:
    timeout: 5000
    check: false

logging:
  level:
    root: INFO
    com.lzlj.account: DEBUG

jwt:
  secret: your-256-bit-secret-key-for-jwt-token-signing-lzlj
  expiration: 86400000
