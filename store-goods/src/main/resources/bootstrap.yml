server:
  port: 9093

spring:
  application:
    name: store-goods
  config:
    import: optional:nacos:store-goods.yml
  cloud:
    nacos:
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      server-addr: ${NACOS_SERVER:127.0.0.1:8848}
      config:
        import-check:
          enabled: false
        namespace: ${NACOS_NAMESPACE:public}
        group: DEFAULT_GROUP
        file-extension: yml
        shared-configs:
          - data-id: common.yml
            group: DEFAULT_GROUP
            refresh: true
      discovery:
        namespace: ${NACOS_NAMESPACE:public}
        group: DEFAULT_GROUP
    sentinel:
      eager: true
      transport:
        port: 8719
      datasource:
        ds:
          nacos:
            server-addr: ${NACOS_SERVER:127.0.0.1:8848}
            dataId: ${spring.application.name}-sentinel
            groupId: ${NACOS_GROUP:LZLJ_GROUP}
            data-type: json
            rule-type: flow
