server:
  port: 9095

spring:
  application:
    name: store-data
  config:
    import: optional:nacos:store-data.yml
  autoconfigure:
    exclude:
      - com.alibaba.druid.spring.boot3.autoconfigure.DruidDataSourceAutoConfigure
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      password:
      timeout: 3000
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000

redisson:
  single-server-config:
    address: redis://127.0.0.1:6379
    password: null
    database: 0
    connection-minimum-idle-size: 5
    connection-pool-size: 10
