# ============================================
# saas-goods 启动配置 - 最小化版本
# 所有业务配置统一在 Nacos 中管理
# ============================================

server:
  port: 9091

spring:
  application:
    name: saas-goods
  profiles:
    active: dev
  config:
    import: optional:nacos:common.yml,optional:nacos:saas-goods.yml
  autoconfigure:
    exclude:
      - io.seata.spring.boot.autoconfigure.SeataAutoConfiguration
      - io.seata.spring.boot.autoconfigure.SeataCoreAutoConfiguration
      - io.seata.spring.boot.autoconfigure.SeataDataSourceAutoConfiguration
  cloud:
    nacos:
      username: nacos
      password: nacos
      server-addr: 127.0.0.1:8848
      config:
        namespace: 6fcc6887-5cdd-47d0-aece-6387e527b368
        group: DEFAULT_GROUP
        file-extension: yml
        import-check:
          enabled: false
      discovery:
        namespace: 6fcc6887-5cdd-47d0-aece-6387e527b368
        group: DEFAULT_GROUP
# 启用 Feign CircuitBreaker (Fallback)
feign:
  circuitbreaker:
    enabled: true
  client:
    default-to-properties: false
